name: release

# Build and push the multi-arch image to Docker Hub on a version tag (e.g. v0.1.0).
# Requires repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (a Hub access token).
on:
  push:
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derives tags (latest, X.Y.Z, X.Y) and org.opencontainers.image.* labels.
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: treewyrm/webdirstat
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=WebDirStat
            org.opencontainers.image.description=WinDirStat-style disk-usage visualizer for your NAS — interactive treemap, background scanning.
            org.opencontainers.image.licenses=MIT

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
